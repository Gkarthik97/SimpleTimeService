name: CI CD Pipeline

on:
  workflow_dispatch:
    inputs:
      tf_action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - plan
          - apply
        

jobs:

  # ---------------- JOB 1: BUILD & PUSH ----------------
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: tag
        run: echo "tag=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        run: |
          docker build -t simpletimeservice:latest .
          docker tag simpletimeservice:latest karthikeyudu/simpletimeservice:${{ steps.tag.outputs.tag }}
          docker push karthikeyudu/simpletimeservice:${{ steps.tag.outputs.tag }}

  # ---------------- JOB 2: TERRAFORM ----------------
  terraform:
    needs: build   # 👈 runs only if build succeeds
    runs-on: ubuntu-latest

    outputs:
      public_ip: ${{ steps.ip.outputs.ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Action
        run: |
          ACTION="${{ github.event.inputs.tf_action }}"
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"

          case "$ACTION" in
            plan)
              terraform plan -var="image_tag=$IMAGE_TAG" -out=tfplan
              ;;

            apply)
              terraform plan -var="image_tag=$IMAGE_TAG" -out=tfplan
              terraform apply tfplan
              ;;

            destroy)
              terraform destroy -var="image_tag=$IMAGE_TAG" -auto-approve
              exit 0
              ;;
          esac

      - name: Get Public IP
        id: ip
        if: github.event.inputs.tf_action == 'apply'
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  # ---------------- JOB 3: DEPLOY ----------------
  deploy:
    needs: terraform   # 👈 runs only if terraform succeeds
    runs-on: ubuntu-latest

    if: github.event.inputs.tf_action == 'apply'

    steps:
      - name: Wait for EC2
        run: sleep 60

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.public_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2"

            sudo apt update -y
            sudo apt install -y docker.io

            sudo systemctl start docker
            sudo systemctl enable docker

            sudo docker pull karthikeyudu/simpletimeservice:${{ github.run_number }}

            sudo docker stop app || true
            sudo docker rm app || true

            sudo docker run -d --name app -p 5000:5000 \
              karthikeyudu/simpletimeservice:${{ github.run_number }}

      - name: Print URL
        run: echo "App running at http://${{ needs.terraform.outputs.public_ip }}:5000"
