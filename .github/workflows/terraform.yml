name: CI+Terraform+Docker+ALB

on:
  workflow_dispatch:
    inputs:
      tf_action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  IMAGE_TAG: ${{ github.run_number }}
  IMAGE_NAME: karthikeyudu/simpletimeservice

jobs:

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    if: github.event.inputs.tf_action != 'destroy'

    outputs:
      image_tag: ${{ github.run_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t simpletimeservice:latest .
          docker tag simpletimeservice:latest \
            $IMAGE_NAME:$IMAGE_TAG

          docker push $IMAGE_NAME:$IMAGE_TAG

# ---------------- TERRAFORM ----------------
  terraform:
    needs: build
    runs-on: ubuntu-latest

    outputs:
      alb_dns: ${{ steps.alb.outputs.alb_dns }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # 🔥 PASS DOCKER IMAGE TAG TO TERRAFORM
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="image_tag=${{ github.run_number }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.tf_action == 'apply'
        run: |
          terraform apply tfplan

      - name: Destroy Infrastructure
        if: github.event.inputs.tf_action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Get ALB DNS
        id: alb
        if: github.event.inputs.tf_action == 'apply'
        run: echo "alb_dns=$(terraform output -raw alb_dns)" >> $GITHUB_OUTPUT

# ---------------- OUTPUT ----------------
  output:
    needs: terraform
    runs-on: ubuntu-latest
    if: github.event.inputs.tf_action == 'apply'

    steps:
      - name: Print Application URL
        run: |
          echo "=================================="
          echo "🚀 Application Deployed Successfully"
          echo "🌐 URL: http://${{ needs.terraform.outputs.alb_dns }}"
          echo "=================================="
