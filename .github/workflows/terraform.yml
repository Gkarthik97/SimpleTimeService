name: CI+Terraform+Docker 

on:
  workflow_dispatch:
    inputs:
      tf_action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:

  build:
    runs-on: ubuntu-latest

    if: github.event.inputs.tf_action != 'destroy'   

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t simpletimeservice:latest .
          docker tag simpletimeservice:latest karthikeyudu/simpletimeservice:${{ github.run_number }}
          docker push karthikeyudu/simpletimeservice:${{ github.run_number }}

  terraform:
    needs: build
    runs-on: ubuntu-latest

    if: always()

    outputs:
      public_ip: ${{ steps.ip.outputs.ip }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Action
        run: |
          ACTION="${{ github.event.inputs.tf_action }}"

          case "$ACTION" in
            plan)
              terraform plan -out=tfplan
              ;;

            apply)
              terraform plan -out=tfplan
              terraform apply tfplan
              ;;

            destroy)
              terraform destroy -auto-approve
              exit 0
              ;;
          esac

      - name: Get Public IP
        id: ip
        if: github.event.inputs.tf_action == 'apply'
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    if: github.event.inputs.tf_action == 'apply'  

    steps:
      - name: Wait for EC2
        run: sleep 60

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.public_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to $(hostname)"
            sudo apt update -y
             docker pull karthikeyudu/simpletimeservice:${{ github.run_number }}
             docker stop app || true
             docker rm app || true
             docker run -d --name app -p 5000:5000 karthikeyudu/simpletimeservice:${{ github.run_number }}

      - name: Print URL
        run: echo "App running at http://${{ needs.terraform.outputs.public_ip }}:5000"
